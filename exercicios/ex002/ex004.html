<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font:normal 20pt arial;
            background-color: rgb(179, 164, 194);
            color: rgb(19, 19, 159);
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt ('Qual e seu nome?')
        document.write(`Ola, <strong>${nome}</strong>! Seu nome tem ${nome.length} letras !!!!<br/>`)

        document.write(`Seu nome em maiusculo fica assim <strong>${nome.toUpperCase()}</strong> !<br/>`)

        document.write(`Ola ${nome}! seu nome em minusculo fica assim <strong>${nome.toLowerCase()}</strong>`)

    </script>
</body>
</html>
